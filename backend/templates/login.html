<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AiMaster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .logo p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .captcha-group {
            display: flex;
            gap: 12px;
        }
        .captcha-group input {
            flex: 1;
        }
        .captcha-group img {
            width: 100px;
            height: 42px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .links {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>AiMaster</h1>
            <p>AI 改写助手 - 内容采集与处理平台</p>
        </div>

        <div class="error" id="error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" required placeholder="请输入用户名">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" required placeholder="请输入密码">
            </div>

            <div class="form-group">
                <label>验证码</label>
                <div class="captcha-group">
                    <input type="text" id="captcha" placeholder="请输入验证码">
                    <img id="captchaImg" src="" alt="验证码" title="点击刷新">
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn">登 录</button>
        </form>

        <div class="links">
            还没有账号？ <a href="/register">立即注册</a>
        </div>
    </div>

    <script>
        const API_BASE = '/api/auth';

        let captchaId = '';

        // 加载验证码
        async function loadCaptcha() {
            try {
                const res = await fetch(`${API_BASE}/captcha`);
                const data = await res.json();
                captchaId = data.captcha_id;
                document.getElementById('captchaImg').src = data.captcha_image;
            } catch (e) {
                console.error('加载验证码失败', e);
            }
        }

        // 显示错误
        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('show');
        }

        // 隐藏错误
        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        // 提交表单
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '登录中...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const captchaCode = document.getElementById('captcha').value.trim();

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        password,
                        captcha_id: captchaId,
                        captcha_code: captchaCode
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    // 保存 token
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    // 跳转到首页
                    window.location.href = '/';
                } else {
                    showError(data.detail || '登录失败');
                    loadCaptcha();
                }
            } catch (e) {
                showError('网络错误，请稍后重试');
                loadCaptcha();
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        });

        // 验证码点击刷新
        document.getElementById('captchaImg').addEventListener('click', loadCaptcha);

        // 初始化
        loadCaptcha();
    </script>
</body>
</html>
